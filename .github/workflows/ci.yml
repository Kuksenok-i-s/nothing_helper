name: CI

on:
  push:
  pull_request:

jobs:
  build-test-linux:
    name: Linux — vet / build / test -race
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race)
        run: go test -race ./...

  build-test-macos:
    name: macOS — vet / build / test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  linux-package-deb:
    name: Linux — Debian package (amd64)
    runs-on: ubuntu-latest
    needs: build-test-linux
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build dependencies
        run: sudo make install-deps-debian

      - name: Build Debian package
        env:
          ARCH: amd64
        run: make package-deb
